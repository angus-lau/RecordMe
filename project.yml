name: RecordMe
options:
  bundleIdPrefix: com.recordme
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
targets:
  RecordMe:
    type: application
    platform: macOS
    sources:
      - path: RecordMe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recordme.app
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_ENTITLEMENTS: RecordMe/RecordMe.entitlements
        INFOPLIST_FILE: RecordMe/Info.plist
    entitlements:
      path: RecordMe/RecordMe.entitlements
  RecordMeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RecordMeTests
    dependencies:
      - target: RecordMe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.recordme.tests
        GENERATE_INFOPLIST_FILE: YES
